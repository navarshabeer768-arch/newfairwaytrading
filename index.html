<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>🍿 Popcorn POS System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #0f0e0d;
  --surface: #1a1917;
  --surface2: #242220;
  --surface3: #2e2c29;
  --border: #3a3835;
  --text: #f5f0e8;
  --text2: #a09888;
  --text3: #6b6560;
  --accent: #f5a623;
  --accent2: #e8850a;
  --red: #e85d4a;
  --green: #4caf7d;
  --blue: #5b9cf6;
  --purple: #9b6dff;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ---- LAYOUT ---- */
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.3s;
}

.sidebar-logo {
  padding: 0 20px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.sidebar-logo h1 {
  font-size: 1.2rem;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.sidebar-logo span { font-size: 1.4rem; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 20px;
  cursor: pointer;
  color: var(--text2);
  font-size: 0.875rem;
  font-weight: 500;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  text-decoration: none;
}
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent); background: rgba(245,166,35,0.08); border-left-color: var(--accent); }
.nav-item .icon { font-size: 1.1rem; width: 22px; text-align: center; }

.sidebar-footer {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.user-info { font-size: 0.8rem; color: var(--text2); margin-bottom: 10px; }
.user-info strong { display: block; color: var(--text); font-size: 0.875rem; }
.badge-role {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-role.admin { background: rgba(155,109,255,0.2); color: var(--purple); }
.badge-role.manager { background: rgba(91,156,246,0.2); color: var(--blue); }
.badge-role.cashier { background: rgba(76,175,125,0.2); color: var(--green); }

.main-content {
  margin-left: 220px;
  flex: 1;
  min-height: 100vh;
}

.page-header {
  padding: 24px 28px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.page-header h2 { font-size: 1.5rem; color: var(--text); }
.page-subtext { color: var(--text2); font-size: 0.875rem; margin-top: 2px; }

.page-body { padding: 20px 28px 32px; }

/* ---- CARDS ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  border-radius: 0 12px 0 80px;
  opacity: 0.12;
}
.stat-card.orange::before { background: var(--accent); }
.stat-card.green::before { background: var(--green); }
.stat-card.blue::before { background: var(--blue); }
.stat-card.red::before { background: var(--red); }

.stat-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 6px; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 700; color: var(--text); }
.stat-value.orange { color: var(--accent); }
.stat-value.green { color: var(--green); }
.stat-value.blue { color: var(--blue); }
.stat-value.red { color: var(--red); }
.stat-icon { position: absolute; top: 16px; right: 16px; font-size: 1.8rem; opacity: 0.7; }

/* ---- GRID ---- */
.grid { display: grid; gap: 16px; }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }

/* ---- BUTTONS ---- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #1a1400; }
.btn-primary:hover:not(:disabled) { background: var(--accent2); }
.btn-secondary { background: var(--surface3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { background: var(--border); }
.btn-danger { background: rgba(232,93,74,0.15); color: var(--red); border: 1px solid rgba(232,93,74,0.3); }
.btn-danger:hover:not(:disabled) { background: rgba(232,93,74,0.25); }
.btn-success { background: rgba(76,175,125,0.15); color: var(--green); border: 1px solid rgba(76,175,125,0.3); }
.btn-success:hover:not(:disabled) { background: rgba(76,175,125,0.25); }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }
.btn-lg { padding: 14px 28px; font-size: 1rem; }
.btn-icon { padding: 8px; border-radius: 8px; }

/* ---- INPUTS ---- */
.input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 0.875rem;
  font-family: 'DM Sans', sans-serif;
  width: 100%;
  transition: border-color 0.15s;
  outline: none;
}
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text3); }

.select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 0.875rem;
  font-family: 'DM Sans', sans-serif;
  width: 100%;
  outline: none;
  cursor: pointer;
}
.select:focus { border-color: var(--accent); }
.select option { background: var(--surface2); }

.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ---- TABLE ---- */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left;
  padding: 10px 14px;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
}
tbody td {
  padding: 12px 14px;
  font-size: 0.875rem;
  color: var(--text);
  border-bottom: 1px solid rgba(58,56,53,0.5);
}
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody tr:last-child td { border-bottom: none; }

/* ---- BADGE ---- */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-sm { padding: 2px 8px; font-size: 0.68rem; }
.badge.green { background: rgba(76,175,125,0.15); color: var(--green); }
.badge.red { background: rgba(232,93,74,0.15); color: var(--red); }
.badge.orange { background: rgba(245,166,35,0.15); color: var(--accent); }
.badge.blue { background: rgba(91,156,246,0.15); color: var(--blue); }
.badge.purple { background: rgba(155,109,255,0.15); color: var(--purple); }

/* ---- POS ---- */
.pos-layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  height: calc(100vh - 60px);
  overflow: hidden;
}

.pos-left {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

.pos-toolbar {
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.pos-products {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
}

.product-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 10px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  position: relative;
}
.product-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
.product-card:active { transform: translateY(0); }
.product-card .flavor-emoji { font-size: 2rem; margin-bottom: 6px; display: block; }
.product-card .prod-name { font-size: 0.75rem; font-weight: 600; color: var(--text); margin-bottom: 2px; line-height: 1.2; }
.product-card .prod-size { font-size: 0.68rem; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; }
.product-card .prod-price { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--accent); }

/* ---- CART ---- */
.pos-right {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface);
}

.cart-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.cart-header h3 { font-size: 1rem; }

.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 8px;
  border-bottom: 1px solid rgba(58,56,53,0.5);
}
.cart-item:last-child { border-bottom: none; }
.cart-item-emoji { font-size: 1.4rem; flex-shrink: 0; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 0.8rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cart-item-size { font-size: 0.7rem; color: var(--text3); }
.cart-qty-controls { display: flex; align-items: center; gap: 6px; }
.qty-btn {
  width: 26px; height: 26px;
  border-radius: 6px;
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 600;
  transition: all 0.1s;
}
.qty-btn:hover { background: var(--border); }
.qty-num { font-size: 0.875rem; font-weight: 600; min-width: 20px; text-align: center; }
.cart-item-price { font-family: 'Syne', sans-serif; font-size: 0.875rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
.cart-remove { color: var(--red); cursor: pointer; opacity: 0.7; font-size: 1rem; padding: 2px; transition: opacity 0.15s; }
.cart-remove:hover { opacity: 1; }

.cart-footer {
  border-top: 1px solid var(--border);
  padding: 14px 16px;
}

.cart-totals { margin-bottom: 12px; }
.cart-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.875rem; color: var(--text2); }
.cart-row.total { color: var(--text); font-size: 1.1rem; font-weight: 700; font-family: 'Syne', sans-serif; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }

.payment-methods { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
.pay-method {
  padding: 8px 4px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
  text-align: center;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text2);
  transition: all 0.15s;
}
.pay-method:hover { color: var(--text); border-color: var(--text3); }
.pay-method.active { background: rgba(245,166,35,0.12); border-color: var(--accent); color: var(--accent); }

/* ---- MODAL ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.modal-header h3 { font-size: 1.2rem; }
.modal-close { cursor: pointer; color: var(--text2); font-size: 1.2rem; padding: 4px; transition: color 0.15s; }
.modal-close:hover { color: var(--text); }

/* ---- RECEIPT ---- */
.receipt {
  background: #fff;
  color: #111;
  font-family: 'Courier New', monospace;
  padding: 20px;
  width: 320px;
  margin: 0 auto;
  font-size: 12px;
}
.receipt-header { text-align: center; margin-bottom: 16px; }
.receipt-header h2 { font-size: 16px; margin-bottom: 4px; }
.receipt-divider { border-top: 1px dashed #333; margin: 8px 0; }
.receipt-row { display: flex; justify-content: space-between; margin: 3px 0; }
.receipt-total-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-top: 4px; }

/* ---- LOGIN ---- */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.login-page::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(245,166,35,0.08) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  position: relative;
  z-index: 1;
}
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo .emoji { font-size: 3.5rem; margin-bottom: 12px; display: block; }
.login-logo h1 { font-size: 1.6rem; color: var(--accent); }
.login-logo p { font-size: 0.875rem; color: var(--text2); margin-top: 4px; }

/* ---- ALERTS ---- */
.alert {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 0.875rem;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.alert.error { background: rgba(232,93,74,0.12); border: 1px solid rgba(232,93,74,0.3); color: var(--red); }
.alert.success { background: rgba(76,175,125,0.12); border: 1px solid rgba(76,175,125,0.3); color: var(--green); }
.alert.warning { background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.3); color: var(--accent); }

/* ---- MISC ---- */
.topbar {
  height: 60px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--surface3);
  border: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.chip.active, .chip:hover { background: rgba(245,166,35,0.12); border-color: var(--accent); color: var(--accent); }

.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text3);
}
.empty-state .emoji { font-size: 3rem; margin-bottom: 12px; display: block; }
.empty-state p { font-size: 0.875rem; }

.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text2); }

.search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  flex: 1;
  max-width: 300px;
}
.search-bar input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 0.875rem;
  font-family: 'DM Sans', sans-serif;
  width: 100%;
}
.search-bar input::placeholder { color: var(--text3); }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .pos-layout { grid-template-columns: 1fr; }
  .pos-right { position: fixed; bottom: 0; right: 0; left: 0; height: 50vh; z-index: 90; border-top: 2px solid var(--accent); }
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
}

@media print {
  body * { visibility: hidden; }
  .receipt, .receipt * { visibility: visible; }
  .receipt { position: fixed; top: 0; left: 0; width: 100%; }
}

.flavor-butter { background: linear-gradient(135deg, rgba(245,166,35,0.1), rgba(245,166,35,0.05)); }
.flavor-caramel { background: linear-gradient(135deg, rgba(180,90,30,0.1), rgba(180,90,30,0.05)); }
.flavor-cheese { background: linear-gradient(135deg, rgba(255,200,0,0.1), rgba(255,200,0,0.05)); }
.flavor-chocolate { background: linear-gradient(135deg, rgba(100,50,20,0.15), rgba(100,50,20,0.05)); }
.flavor-spicy { background: linear-gradient(135deg, rgba(232,93,74,0.1), rgba(232,93,74,0.05)); }
.flavor-ranch { background: linear-gradient(135deg, rgba(76,175,125,0.1), rgba(76,175,125,0.05)); }
.flavor-mixed { background: linear-gradient(135deg, rgba(155,109,255,0.1), rgba(155,109,255,0.05)); }

.scanner-area {
  background: var(--surface2);
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  transition: all 0.2s;
}
.scanner-area.active { border-color: var(--accent); background: rgba(245,166,35,0.05); }

.tab-bar {
  display: flex;
  gap: 2px;
  background: var(--surface2);
  border-radius: 10px;
  padding: 4px;
}
.tab {
  flex: 1;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
  text-align: center;
  color: var(--text2);
  transition: all 0.15s;
}
.tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

.low-stock { color: var(--red); font-weight: 600; }
.ok-stock { color: var(--green); }

#scanner-container video { width: 100%; border-radius: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const MOCK_PRODUCTS = [
  { product_id:'1', name:'Butter Popcorn', flavor:'Butter', size:'small', price:3.99, barcode:'100000001' },
  { product_id:'2', name:'Butter Popcorn', flavor:'Butter', size:'medium', price:5.99, barcode:'100000002' },

// =====================
// QAR CURRENCY FORMATTER (English)
// =====================
// Locale en-US + currencyDisplay:'code' => always renders as "QAR 14.99"
const _qarFmt = new Intl.NumberFormat('en-US', {
  style: 'currency',
  currency: 'QAR',
  currencyDisplay: 'code',
  minimumFractionDigits: 2,
  maximumFractionDigits: 2,
});
// Strip any stray placement quirks and guarantee "QAR X.XX"
const formatQAR = (amount) => {
  const s = _qarFmt.format(amount);         // en-US gives "QAR14.99"
  const num = s.replace(/[^\d.,]/g, '');    // extract digits
  return 'QAR ' + num;                 // non-breaking space for neat layout
};

const API_BASE = 'http://localhost:5000/api';

const api = {
  token: localStorage.getItem('pos_token'),
  
  headers() {
    return {
      'Content-Type': 'application/json',
      ...(this.token ? { Authorization: `Bearer ${this.token}` } : {})
    };
  },

  async request(method, path, body) {
    try {
      const res = await fetch(`${API_BASE}${path}`, {
        method,
        headers: this.headers(),
        body: body ? JSON.stringify(body) : undefined
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'API error');
      return data;
    } catch (e) {
      // Fallback to mock data in demo mode
      console.warn('API unavailable, using mock data:', e.message);
      return null;
    }
  },

  get: (path) => api.request('GET', path),
  post: (path, body) => api.request('POST', path, body),
  put: (path, body) => api.request('PUT', path, body),
  delete: (path) => api.request('DELETE', path),
};

const useStore = (() => {
  let listeners = new Set();
  let state = {
    user: JSON.parse(localStorage.getItem('pos_user') || 'null'),
    token: localStorage.getItem('pos_token') || null,
    cart: [],
    products: MOCK_PRODUCTS,

    currentCustomer: null,
    discount: 0,
    discountType: 'fixed',
    paymentMethod: 'cash',
    page: 'pos',
    darkMode: true,
  };

  const setState = (updates) => {
    state = { ...state, ...updates };
    listeners.forEach(fn => fn(state));
  };

  return () => {
    const [s, setS] = useState(state);
    useEffect(() => {
      listeners.add(setS);
      return () => listeners.delete(setS);
    }, []);
    return [s, setState];
  };
})();

function POSPage({ user }) {
  const [products] = useState(MOCK_PRODUCTS);
  const [customers] = useState(MOCK_CUSTOMERS);
  const [cart, setCart] = useState([]);
  const [search, setSearch] = useState('');
  const [filterFlavor, setFilterFlavor] = useState('');
  const [paymentMethod, setPaymentMethod] = useState('cash');
  const [discount, setDiscount] = useState(0);
  const [selectedCustomer, setSelectedCustomer] = useState(null);
  const [showScanner, setShowScanner] = useState(false);
  const [showReceipt, setShowReceipt] = useState(false);
  const [lastOrder, setLastOrder] = useState(null);
  const [amountPaid, setAmountPaid] = useState('');
  const [showCheckout, setShowCheckout] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [alert, setAlert] = useState(null);
  const [barcodeInput, setBarcodeInput] = useState('');
  const barcodeRef = useRef(null);

  const TAX_RATE = 0.08;

  const filtered = useMemo(() => products.filter(p => {
    const s = search.toLowerCase();
    const matchSearch = !s || p.name.toLowerCase().includes(s) || p.barcode?.includes(s) || p.flavor.toLowerCase().includes(s);
    const matchFlavor = !filterFlavor || p.flavor === filterFlavor;
    return matchSearch && matchFlavor;
  }), [products, search, filterFlavor]);

  const flavors = [...new Set(products.map(p => p.flavor))];

  const addToCart = (product) => {
    setCart(prev => {
      const existing = prev.find(i => i.product_id === product.product_id);
      if (existing) {
        return prev.map(i => i.product_id === product.product_id ? { ...i, qty: i.qty + 1 } : i);
      }
      return [...prev, { ...product, qty: 1 }];
    });
    showAlert('success', `✓ ${product.name} added to cart`);
  };

  const removeFromCart = (id) => setCart(prev => prev.filter(i => i.product_id !== id));
  const updateQty = (id, delta) => {
    setCart(prev => {
      const updated = prev.map(i => i.product_id === id ? { ...i, qty: Math.max(0, i.qty + delta) } : i);
      return updated.filter(i => i.qty > 0);
    });
  };

  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const taxAmount = subtotal * TAX_RATE;
  const discountAmt = Math.min(discount, subtotal);
  const total = subtotal + taxAmount - discountAmt;
  const change = paymentMethod === 'cash' && amountPaid ? Math.max(0, parseFloat(amountPaid) - total) : 0;

  const showAlert = (type, msg) => {
    setAlert({ type, msg });
    setTimeout(() => setAlert(null), 2500);
  };

  const handleBarcodeSubmit = (e) => {
    e.preventDefault();
    const product = products.find(p => p.barcode === barcodeInput.trim());
    if (product) {
      addToCart(product);
      setBarcodeInput('');
    } else {
      showAlert('error', 'Product not found for barcode: ' + barcodeInput);
    }
  };

  const processOrder = async () => {
    if (cart.length === 0) { showAlert('error', 'Cart is empty'); return; }
    if (paymentMethod === 'cash' && parseFloat(amountPaid) < total) {
      showAlert('error', 'Amount paid is less than total');
      return;
    }
    setProcessing(true);
    try {
      const orderNum = 'POP-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '-' + Math.floor(Math.random()*9000+1000);
      const order = {
        order_number: orderNum,
        items: cart.map(i => ({ product_id: i.product_id, name: i.name, flavor: i.flavor, size: i.size, quantity: i.qty, unit_price: i.price })),
        customer: selectedCustomer,
        subtotal, taxAmount, discount: discountAmt, total,
        payment_method: paymentMethod,
        amount_paid: parseFloat(amountPaid) || total,
        change,
        cashier: user.name,
        created_at: new Date().toISOString()
      };
      await new Promise(r => setTimeout(r, 800));
      setLastOrder(order);
      setCart([]);
      setDiscount(0);
      setSelectedCustomer(null);
      setAmountPaid('');
      setShowCheckout(false);
      setShowReceipt(true);
      showAlert('success', '✓ Order completed!');
    } finally {
      setProcessing(false);
    }
  };

// =====================
// MAIN APP
// =====================
function App() {
  const [user, setUser] = useState(JSON.parse(localStorage.getItem('pos_user') || 'null'));
  const [page, setPage] = useState('pos');

  const handleLogin = (userData) => {
    setUser(userData);
    setPage('pos');
  };

  const handleLogout = () => {
    localStorage.removeItem('pos_token');
    localStorage.removeItem('pos_user');
    api.token = null;
    setUser(null);
  };

  if (!user) return React.createElement(LoginPage, { onLogin: handleLogin });

  const renderPage = () => {
    switch(page) {
      case 'dashboard': return React.createElement(Dashboard);
      case 'pos': return React.createElement(POSPage, { user });
      case 'products': return React.createElement(ProductsPage);
      case 'inventory': return React.createElement(InventoryPage);
      case 'customers': return React.createElement(CustomersPage);
      case 'orders': return React.createElement(OrdersPage);
      case 'reports': return React.createElement(ReportsPage);
      case 'settings': return React.createElement(SettingsPage);
      default: return React.createElement(POSPage, { user });
    }
  };

  const isPOS = page === 'pos';

  return React.createElement('div', { className: 'app' },
    React.createElement(Sidebar, { currentPage: page, onNavigate: setPage, user, onLogout: handleLogout }),
    React.createElement('main', { className: 'main-content' },
      isPOS ? renderPage() : React.createElement('div', null, renderPage())
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
